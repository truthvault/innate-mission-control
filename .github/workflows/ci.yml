name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Monday mutation ban (read-only guard)
        run: npm run check:mutations
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        env:
          # Build needs these to load the read-only guard; values are placeholders.
          READ_ONLY_MONDAY_SYNC: "true"
          MONDAY_API_TOKEN: "ci-placeholder"
          MONDAY_ORDERS_BOARD_ID: "0"
        run: npm run build
